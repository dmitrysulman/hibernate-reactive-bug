plugins {
    id 'java'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:6.1.0')
    testImplementation platform('org.testcontainers:testcontainers-bom:2.0.5')
    testImplementation 'org.hibernate.reactive:hibernate-reactive-core:4.4.0.Final'
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.testcontainers:testcontainers-mysql'
    testImplementation 'org.testcontainers:testcontainers-junit-jupiter'
    testImplementation 'ch.qos.logback:logback-classic:1.5.34'

    testRuntimeOnly 'tools.jackson.core:jackson-databind:3.1.4'
    testRuntimeOnly 'io.vertx:vertx-mysql-client:5.0.12'
    testRuntimeOnly 'com.mysql:mysql-connector-j:9.7.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}